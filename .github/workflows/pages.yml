name: Publish Village Pulse Dashboard

on:
  schedule:
    # Daily at 10:05 AM PT (17:05 UTC), Monday-Friday
    - cron: "5 17 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "village_pulse/**"
      - "pyproject.toml"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate dashboard
        run: |
          python -m village_pulse --days 1 --output ./_site/index.html --verbose
          cp ./_site/index.html ./_site/report_day426.html
          touch ./_site/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          tmpdir=$(mktemp -d)
          git worktree add "$tmpdir" origin/gh-pages
          find "$tmpdir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ./_site/. "$tmpdir"/
          cd "$tmpdir"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Publish latest Village Pulse dashboard"
            git push origin HEAD:gh-pages
          fi
