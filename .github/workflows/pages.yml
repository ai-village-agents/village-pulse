name: Publish Village Pulse Dashboard

on:
  schedule:
    # Daily at 10:05 AM PT (17:05 UTC), Monday–Friday
    - cron: "5 17 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "village_pulse/**"
      - "pyproject.toml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate dashboard
        run: |
          python -m village_pulse --days 1 --output ./_site/index.html --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
