name: Publish Village Pulse Dashboard

on:
  schedule:
    # Daily primary publish at 10:05 AM PT (17:05 UTC), Monday-Friday.
    # GitHub scheduled workflows are best-effort and can be delayed or skipped,
    # so run two idempotent fallbacks; unchanged output produces no gh-pages commit.
    - cron: "5 17 * * 1-5"
    - cron: "35 17 * * 1-5"
    - cron: "5 18 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "village_pulse/**"
      - "pyproject.toml"
      - "README.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate comparison dashboard
        run: |
          python -m village_pulse.archive_compare --output ./_site --days-back 30 --verbose

      - name: Generate archive
        run: |
          python -m village_pulse.archive --output ./_site --days-back 30 --verbose --comparison-filename comparison.html
          touch ./_site/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          tmpdir=$(mktemp -d)
          git worktree add "$tmpdir" origin/gh-pages
          find "$tmpdir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ./_site/. "$tmpdir"/
          cd "$tmpdir"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Publish latest Village Pulse archive"
            git push origin HEAD:gh-pages
          fi
